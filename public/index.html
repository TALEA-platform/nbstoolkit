<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <script>
      // Lock layout viewport to 850 on narrow phones so the desktop
      // layout holds together; tablets and desktops keep device-width.
      // Written via document.write during head parse so the browser
      // commits to the right viewport on the first layout — mutating
      // an existing meta after parse can leave DevTools' mobile
      // emulation stuck at the original width.
      (function () {
        var narrow = window.screen && window.screen.width < 850;
        var content = narrow
          ? "width=850"
          : "width=device-width, initial-scale=1.0";
        document.write('<meta name="viewport" content="' + content + '">');
      })();
    </script>
    <meta name="theme-color" content="#21A84A" />
    <meta
      name="description"
      content="Nature-Based Solutions Toolkit — TALEA Abacus of Hardware Solutions for urban green infrastructure"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Nature-Based Solutions Toolkit — TALEA Abacus</title>
  </head>
