name: Nightly Sync Approved Studies

on:
  schedule:
    # Runs every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync approved studies from Google Sheet
        env:
          GOOGLE_SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: node scripts/sync-approved.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/caseStudies.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated case studies
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/caseStudies.json
          git commit -m "chore: sync approved case studies from Google Sheet"
          git push

      - name: Build project
        if: steps.changes.outputs.changed == 'true'
        env:
          REACT_APP_GOOGLE_SHEET_URL: ${{ secrets.REACT_APP_GOOGLE_SHEET_URL }}
          REACT_APP_IMGBB_API_KEY: ${{ secrets.REACT_APP_IMGBB_API_KEY }}
          REACT_APP_WORKER_URL: ${{ secrets.REACT_APP_WORKER_URL }}
        run: npm run build

      - name: Deploy to GitHub Pages
        if: steps.changes.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
